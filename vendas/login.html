<style>
  *{box-sizing:border-box;}
  body{
    font-family:'Inter', sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .font-display{font-family:'Space Grotesk', sans-serif;}

  .input-block{
    background:#0A0A0A;
    border:1px solid rgba(255,255,255,0.12);
    transition:border-color .2s ease;
  }
  .input-block:focus-within{
    border-color:rgba(255,255,255,0.35);
  }

  .social-btn{
    background:transparent;
    border:1px solid rgba(255,255,255,0.14);
    transition:border-color .2s ease, background .2s ease;
  }
  .social-btn:hover{
    border-color:rgba(255,255,255,0.3);
    background:rgba(255,255,255,0.03);
  }

  input::placeholder{ color:#6B6B6B; }

  input:focus{ outline:none; }

  a:focus-visible, button:focus-visible{
    outline:2px solid #ffffff;
    outline-offset:2px;
  }
</style>

        <path fill="#4285F4" d="M23.49 12.27c0-.79-.07-1.54-.19-2.27H12v4.51h6.47a5.54 5.54 0 0 1-2.4 3.63v3h3.87c2.27-2.09 3.55-5.17 3.55-8.87z"/>
        <path fill="#34A853" d="M12 24c3.24 0 5.95-1.07 7.93-2.91l-3.87-3a7.4 7.4 0 0 1-11-3.89H1.08v3.09A12 12 0 0 0 12 24z"/>
        <path fill="#FBBC05" d="M5.05 14.2A7.2 7.2 0 0 1 4.68 12c0-.76.13-1.5.37-2.2V6.71H1.08A12 12 0 0 0 0 12c0 1.94.46 3.77 1.08 5.29z"/>
        <path fill="#EA4335" d="M12 4.75c1.77 0 3.35.61 4.6 1.8l3.44-3.44C17.94 1.19 15.24 0 12 0A12 12 0 0 0 1.08 6.71l3.97 3.09A7.16 7.16 0 0 1 12 4.75z"/>
      </svg>
      <span class="mx-auto">Continuar com Google</span>
    </button>

  </div>

  <!-- RODAPÉ -->
  <p class="text-center text-neutral-600 text-xs mt-8 leading-relaxed">
    Ao continuar você concorda com os <a href="#" class="underline hover:text-neutral-400 transition-colors">Termos de uso</a>
  </p>

</main>

<script type="module">
  // ============================================================
  // FIREBASE - SDK Web Modular v9+
  // ============================================================
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
  import {
    getAuth,
    GoogleAuthProvider,
    signInWithPopup,
    signInWithEmailAndPassword,
    createUserWithEmailAndPassword,
    RecaptchaVerifier,
    signInWithPhoneNumber,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";

  // COLOQUE SUAS CHAVES AQUI
  const firebaseConfig = {
    apiKey: "SUA_API_KEY",
    authDomain: "SEU_PROJETO.firebaseapp.com",
    projectId: "SEU_PROJETO",
    storageBucket: "SEU_PROJETO.appspot.com",
    messagingSenderId: "SEU_SENDER_ID",
    appId: "SEU_APP_ID"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // ------------------------------------------------------------
  // Redireciona automaticamente se o usuário já estiver logado
  // ------------------------------------------------------------
  onAuthStateChanged(auth, (user) => {
    if (user) {
      window.location.href = "dashboard.html";
    }
  });

  // Helper simples de feedback de erro (troque por um toast se quiser)
  function showAuthError(error) {
    console.error("Erro de autenticação:", error);
    alert(error.message || "Não foi possível concluir o login.");
  }

  // ------------------------------------------------------------
  // 1) LOGIN POR TELEFONE (SMS) — botão "Começar" (id="sign-in-button")
  // ------------------------------------------------------------
  const phoneInput = document.getElementById("phone-input");
  const signInButton = document.getElementById("sign-in-button");

  // reCAPTCHA invisível, ancorado no próprio botão "Começar".
  // Ele "resolve" no clique e dispara o callback automaticamente.
  window.recaptchaVerifier = new RecaptchaVerifier(auth, "sign-in-button", {
    size: "invisible",
    callback: (response) => {
      // reCAPTCHA resolvido, pode chamar signInWithPhoneNumber.
      onSignInSubmit();
    }
  });

  // Obs.: não é preciso um addEventListener("click") manual no botão —
  // o reCAPTCHA invisível já intercepta o clique nele e, ao validar,
  // dispara o callback acima automaticamente.

  async function onSignInSubmit() {
    const rawNumber = phoneInput.value.trim();
    if (!rawNumber) {
      alert("Digite seu número de WhatsApp.");
      return;
    }
    // Garante o formato E.164 (+55XXXXXXXXXXX)
    const phoneNumber = rawNumber.startsWith("+") ? rawNumber : `+55${rawNumber.replace(/\D/g, "")}`;
    const appVerifier = window.recaptchaVerifier;

    try {
      signInButton.disabled = true;
      const confirmationResult = await signInWithPhoneNumber(auth, phoneNumber, appVerifier);
      window.confirmationResult = confirmationResult;

      const code = prompt("Digite o código recebido por SMS:");
      if (code) {
        await confirmationResult.confirm(code);
        // onAuthStateChanged cuida do redirecionamento
      }
    } catch (error) {
      showAuthError(error);
      // Se o reCAPTCHA falhar, reseta para permitir nova tentativa
      window.recaptchaVerifier.render().then((widgetId) => {
        if (window.grecaptcha) window.grecaptcha.reset(widgetId);
      });
    } finally {
      signInButton.disabled = false;
    }
  }

  // ------------------------------------------------------------
  // 2) LOGIN POR E-MAIL/SENHA — botão "Logar com E-mail"
  // ------------------------------------------------------------
  document.getElementById("btn-email").addEventListener("click", async () => {
    const email = prompt("Digite seu e-mail:");
    if (!email) return;
    const password = prompt("Digite sua senha:");
    if (!password) return;

    try {
      // Tenta logar; se o usuário não existir, cria a conta
      await signInWithEmailAndPassword(auth, email, password);
    } catch (error) {
      if (error.code === "auth/user-not-found") {
        try {
          await createUserWithEmailAndPassword(auth, email, password);
        } catch (createError) {
          showAuthError(createError);
        }
      } else {
        showAuthError(error);
      }
    }
  });

  // ------------------------------------------------------------
  // 3) LOGIN COM GOOGLE — botão "Continuar com Google"
  // ------------------------------------------------------------
  document.getElementById("btn-google").addEventListener("click", async () => {
    const provider = new GoogleAuthProvider();
    try {
      await signInWithPopup(auth, provider);
    } catch (error) {
      showAuthError(error);
    }
  });
</script>

</body>
